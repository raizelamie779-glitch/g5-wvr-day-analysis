    // ════════════════════════════════════════════════════════

    const COUNTRIES = Object.keys(RAW);
    const YEARS = Array.from({ length: 21 }, (_, i) => 2005 + i);
    const COLORS = ['#1f77b4', '#ff7f0e', '#2ca02c', '#d62728', '#9467bd', '#8c564b', '#e377c2', '#6baed6', '#bcbd22', '#17becf', '#74c476'];
    const EPOCHS = [
      { label: '2005–2009', start: 0, end: 4, color: '#f0b429', ms: 0, me: 59 },
      { label: '2010–2014', start: 5, end: 9, color: '#4ade80', ms: 60, me: 119 },
      { label: '2015–2019', start: 10, end: 14, color: '#60a5fa', ms: 120, me: 179 },
      { label: '2020–2025', start: 15, end: 20, color: '#f87171', ms: 180, me: 251 },
    ];

    // Monthly labels
    const MLABELS = [];
    for (let y = 2005; y <= 2025; y++) for (let m = 1; m <= 12; m++) MLABELS.push(`${y}-${String(m).padStart(2, '0')}`);

    // ════════════════════════════════════════════════════════
    // HELPERS
    // ════════════════════════════════════════════════════════
    const annAvg = m => Array.from({ length: 21 }, (_, y) => { const s = m.slice(y * 12, (y + 1) * 12); return s.reduce((a, b) => a + b, 0) / 12; });
    function vstat(d) {
      const n = d.length, mn = d.reduce((a, b) => a + b, 0) / n;
      const sd = Math.sqrt(d.reduce((s, x) => s + Math.pow(x - mn, 2), 0) / n);
      return { mean: mn, min: Math.min(...d), max: Math.max(...d), std: sd, range: Math.max(...d) - Math.min(...d), n };
    }
    function linReg(xs, ys) {
      const n = xs.length, sx = xs.reduce((a, b) => a + b, 0), sy = ys.reduce((a, b) => a + b, 0);
      const sxy = xs.reduce((s, x, i) => s + x * ys[i], 0), sxx = xs.reduce((s, x) => s + x * x, 0);
      const d = n * sxx - sx * sx;
      if (!d) return { m: 0, b: sy / n };
      const m = (n * sxy - sx * sy) / d;
      return { m, b: (sy - m * sx) / n };
    }
    const movAvg = (d, p) => d.map((_, i) => i < p - 1 ? null : d.slice(i - p + 1, i + 1).reduce((a, b) => a + b, 0) / p);
    function acf(data, maxLag = 24) {
      const n = data.length, mn = data.reduce((a, b) => a + b, 0) / n;
      const den = data.reduce((s, x) => s + Math.pow(x - mn, 2), 0);
      if (!den) return new Array(maxLag + 1).fill(0);
      return Array.from({ length: maxLag + 1 }, (_, k) => {
        let num = 0; for (let t = k; t < n; t++) num += (data[t] - mn) * (data[t - k] - mn);
        return +(num / den).toFixed(4);
      });
    }
    function trendDS(avg, ep, color) {
      const xs = Array.from({ length: ep.end - ep.start + 1 }, (_, i) => ep.start + i);
      const ys = xs.map(x => avg[x]), { m, b } = linReg(xs, ys);
      const data = new Array(21).fill(null);
      for (let x = ep.start; x <= ep.end; x++) data[x] = +(m * x + b).toFixed(4);
      return {
        label: `Trend ${ep.label}`, data, borderColor: color, backgroundColor: 'transparent',

    }

    const annual = {};

    const seaAvgMonthly = Array.from({ length: 252 }, (_, i) => COUNTRIES.reduce((s, c) => s + RAW[c][i], 0) / COUNTRIES.length);

    const epACF = EPOCHS.map(ep => {
      const d = seaAvgMonthly.slice(ep.ms, ep.me + 1), n = d.length;
      const vals = acf(d, 24).slice(1);
      const ci = 1.96 / Math.sqrt(n);
      return { lag1: vals[0], lag2: vals[1], ci: +ci.toFixed(4) };
    });

    const epochPlug = {

      beforeDraw(chart) {
        const { ctx, chartArea, scales } = chart;
        if (!chartArea) return;
        const xsc = scales.x;
        const bgs = ['rgba(240,180,41,.06)', 'rgba(74,222,128,.06)', 'rgba(96,165,250,.06)', 'rgba(248,113,113,.06)'];
        const msep = ['2005-01', '2010-01', '2015-01', '2020-01', '2025-12'];
        EPOCHS.forEach((ep, i) => {
          const x0 = xsc.getPixelForValue(msep[i]), x1 = xsc.getPixelForValue(msep[i + 1]);
          ctx.save(); ctx.fillStyle = bgs[i];
          ctx.fillRect(x0, chartArea.top, x1 - x0, chartArea.height); ctx.restore();
        });
        ['2010-01', '2015-01', '2020-01'].forEach(lbl => {
          const mx = xsc.getPixelForValue(lbl);
          ctx.save(); ctx.strokeStyle = 'rgba(255,255,255,0.55)'; ctx.lineWidth = 2;

          ctx.moveTo(mx, chartArea.top); ctx.lineTo(mx, chartArea.bottom);
          ctx.stroke(); ctx.restore();
        });
        EPOCHS.forEach((ep, i) => {

          ctx.fillText(`Ep.${i + 1}`, (x0 + x1) / 2, chartArea.top + 12); ctx.restore();

      }

    // Country dropdown for Linear Trend
    const mainCtryEl = document.getElementById('mainCtry');
    [...COUNTRIES, 'SE Asia Avg'].forEach(c => {
      const o = document.createElement('option'); o.value = c; o.textContent = c; mainCtryEl.appendChild(o);
    });
    mainCtryEl.addEventListener('change', () => {
      const v = mainCtryEl.value;
      mainChart.data.datasets = buildMainDS(v); mainChart.update();
      buildEpCards(v);
    });

    // Epoch summary cards — rebuilt whenever country changes
    function buildEpCards(country) {
      const isSEA = country === 'SE Asia Avg';
      const monthly = isSEA ? seaAvgMonthly : RAW[country];
      const panel = document.getElementById('epcards');
      panel.innerHTML = '';
      EPOCHS.forEach((ep, i) => {
        // Use same monthly regression as the chart trendline so direction matches visually
        const mxs = Array.from({ length: ep.me - ep.ms + 1 }, (_, k) => ep.ms + k);
        const mys = mxs.map(x => monthly[x]);
        const { m: mSlope, b } = linReg(mxs, mys);
        const mPerYear = mSlope * 12; // annualize for display
        const st = vstat(mys);
        // Stable = |slope| < 0.02 g/kg/yr (line visually near-horizontal across all countries)
        const dir = mPerYear > 0.02 ? '↑ Increasing' : mPerYear < -0.02 ? '↓ Decreasing' : '→ Stable';
        const cls = dir === '↑ Increasing' ? 'tup' : dir === '↓ Decreasing' ? 'tdn' : 'tst';
        const n = mys.length;
        const vals = acf(mys, 24).slice(1);
        const ci = +(1.96 / Math.sqrt(n)).toFixed(4);
        const lag1 = +vals[0].toFixed(4), lag2 = +vals[1].toFixed(4);
        const c = document.createElement('div'); c.className = 'epc';
        c.innerHTML = `<h3 style="color:${ep.color};border-color:${ep.color}">Epoch ${i + 1}: ${ep.label}</h3>
      <div class="est"><span>Mean</span><span>${st.mean.toFixed(3)} g/kg</span></div>
      <div class="est"><span>Min</span><span>${st.min.toFixed(3)} g/kg</span></div>
      <div class="est"><span>Max</span><span>${st.max.toFixed(3)} g/kg</span></div>
      <div class="est"><span>Std Dev</span><span>${st.std.toFixed(4)}</span></div>
      <div class="est"><span>Slope</span><span>${mPerYear >= 0 ? '+' : ''}${mPerYear.toFixed(4)} g/kg/yr</span></div>
      <div class="est"><span>Trend</span><span class="${cls}">${dir}</span></div>
      <div style="border-top:1px solid #30363d;margin:7px 0"></div>
      <div class="est"><span>ACF Lag-1</span><span style="color:${Math.abs(lag1) > ci ? '#f87171' : '#8b949e'}">${lag1 >= 0 ? '+' : ''}${lag1}</span></div>
      <div class="est"><span>ACF Lag-2</span><span style="color:${Math.abs(lag2) > ci ? '#f87171' : '#8b949e'}">${lag2 >= 0 ? '+' : ''}${lag2}</span></div>
      <div class="est" style="font-size:.7rem;color:#6e7681"><span>95% CI</span><span>±${ci}</span></div>`;
        panel.appendChild(c);
      });
    }
    buildEpCards(COUNTRIES[0]);

    // ════════════════════════════════════════════════════════
    // MOVING AVERAGE CHART
    // ════════════════════════════════════════════════════════
    // Plugin: monthly epoch bands + vertical lines
    const maCtryEl = document.getElementById('maCtry');
    [...COUNTRIES, 'SE Asia Avg'].forEach((c) => { const o = document.createElement('option'); o.value = c; o.textContent = c; maCtryEl.appendChild(o); });

    function buildMADS(country) {
      const isSEA = country === 'SE Asia Avg';
      const m = isSEA ? seaAvgMonthly : RAW[country];
      const lineColor = isSEA ? 'rgba(255,255,255,0.5)' : 'rgba(96,165,250,0.45)';
      return [
        {
          label: 'Monthly WVR', data: [...m], borderColor: lineColor, backgroundColor: 'transparent',
          borderWidth: 1, pointRadius: 0, tension: 0.2, order: 2
        },
        {
          label: '3-Month MA', data: movAvg(m, 3), borderColor: '#f0b429', backgroundColor: 'transparent',
          borderWidth: 2.5, pointRadius: 0, tension: 0.3, spanGaps: false, order: 1
        },
      ];
    }

    const maChart = new Chart(document.getElementById('maChart').getContext('2d'), {
      type: 'line', data: { labels: MLABELS, datasets: buildMADS(COUNTRIES[0]) },
      options: {
        responsive: true, maintainAspectRatio: false, animation: { duration: 300 },
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#1c2333', borderColor: '#30363d', borderWidth: 1,
            callbacks: { label(c) { if (c.raw === null) return null; return ` ${c.dataset.label}: ${Number(c.raw).toFixed(3)}` } }
          }
        },
        scales: {
          x: {
            grid: { color: '#21262d' },
            ticks: {
              color: '#8b949e', maxRotation: 45,
              callback: (_, idx) => idx % 12 === 0 ? MLABELS[idx].slice(0, 4) : ''
            },
            title: { display: true, text: 'Month', color: '#8b949e' }
          },
          y: {
            grid: { color: '#21262d' }, ticks: { color: '#8b949e' },
            title: { display: true, text: 'WVR (g/kg)', color: '#8b949e' }
          }
        }
      }, plugins: [epochPlug]
    });

    maCtryEl.addEventListener('change', () => {
      const v = maCtryEl.value;
      maChart.data.datasets = buildMADS(v); maChart.update();
      buildEpCards(v);
    });

    // View tab switching
    document.getElementById('tabTrend').addEventListener('click', () => {
      document.getElementById('mainWrap').style.display = '';
      document.getElementById('maWrap').style.display = 'none';
      document.getElementById('trendCtrl').style.display = '';
      document.getElementById('maCtrlTop').style.display = 'none';
      document.getElementById('trendLeg').style.display = '';
      document.getElementById('maLeg').style.display = 'none';
      document.getElementById('tabTrend').classList.add('active');
      document.getElementById('tabMA').classList.remove('active');
      setTimeout(() => mainChart.resize(), 10);
    });
    document.getElementById('tabMA').addEventListener('click', () => {
      document.getElementById('mainWrap').style.display = 'none';
      document.getElementById('maWrap').style.display = '';
      document.getElementById('trendCtrl').style.display = 'none';
      document.getElementById('maCtrlTop').style.display = '';
      document.getElementById('trendLeg').style.display = 'none';
      document.getElementById('maLeg').style.display = '';
      document.getElementById('tabMA').classList.add('active');
      document.getElementById('tabTrend').classList.remove('active');
      setTimeout(() => maChart.resize(), 10);
    });

  </script>
</body>

</html>
